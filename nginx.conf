server {
    listen 80;
    server_name tasktracker.edigitalknowledge.in www.tasktracker.edigitalknowledge.in;

    # Frontend - React build files
    location / {
        root /var/www/tasktracker/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Allow large file uploads (50MB)
    client_max_body_size 50M;

    # Serve uploaded files directly from the filesystem (fast, no Spring Boot proxy needed)
    location /uploads/ {
        alias /var/www/tasktracker/uploads/;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=31536000";
        try_files $uri =404;
    }

    # Backend API - Proxy to Spring Boot
    location /api {
        proxy_pass http://localhost:8087;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        client_max_body_size 50M;
    }

    # Optional: SSL configuration (using Let's Encrypt)
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/tasktracker.edigitalknowledge.in/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/tasktracker.edigitalknowledge.in/privkey.pem;
}
